# ============================================================================
# Security Assumptions Configuration - Hardened Scenario
# ============================================================================
# This file specifies which security assumptions are satisfied in your deployment.
# Use it to override the automatic detection from docker-compose and Dockerfile analysis.
#
# Format: AssumptionID=State
# Valid states: Satisfied, Dissatisfied, Unknown
#
# You can use:
#   - Individual IDs: NET-2, RTS-4, IMG-5
#   - Category shortcuts: IMG, RTS, NET, AUTH, MON, CRM, SCM, HIS, CIC
#     (applies to ALL assumptions in that category)
# ============================================================================

# --- Image Security (IMG) ---
# All image security assumptions satisfied (scanning, minimal images, signing, etc.)
IMG=Satisfied

# --- Runtime Security (RTS) ---
# All runtime security assumptions satisfied (non-root, read-only, capabilities, seccomp, etc.)
RTS=Satisfied

# --- Network Security (NET) ---
# All network security assumptions satisfied (segmentation, firewall, encryption, etc.)
NET=Satisfied

# --- Authentication & Access Control (AUTH) ---
# All authentication assumptions satisfied (API auth, RBAC, access restrictions, etc.)
AUTH=Satisfied

# --- Monitoring & Detection (MON) ---
# All monitoring assumptions satisfied (logging, process monitoring, runtime security tools, etc.)
MON=Satisfied

# --- Compliance & Risk Management (CRM) ---
# All compliance and risk management assumptions satisfied (assessments, policies, audits, etc.)
CRM=Satisfied

# NOTE: The following categories are left as Unknown (system default) to match
# the BalancedContainerSecurityScenario, which represents a mid-sized organization
# with moderate security controls:
#   - SCM (Secrets & Configuration Management): Unknown
#   - HIS (Host & Infrastructure Security): Unknown
#   - CIC (CI/CD & Supply Chain Security): Unknown
